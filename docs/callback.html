<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>tikbuzz OAuth callback</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 720px;
        margin: 3rem auto;
        padding: 0 1.5rem;
        color: #111;
        line-height: 1.6;
      }
      h1 {
        font-size: 1.4rem;
      }
      code,
      .value {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #f4f4f5;
        border: 1px solid #e4e4e7;
        border-radius: 6px;
        padding: 0.1rem 0.4rem;
      }
      .block {
        display: block;
        padding: 0.8rem;
        word-break: break-all;
        white-space: pre-wrap;
        user-select: all;
      }
      .ok {
        color: #0a7d2c;
      }
      .error {
        color: #b91c1c;
      }
      button {
        margin-top: 0.6rem;
        padding: 0.5rem 1rem;
        font-size: 1rem;
        cursor: pointer;
      }
      section {
        margin: 1.5rem 0;
      }
    </style>
  </head>
  <body>
    <h1>認可完了 / Authorization callback</h1>
    <p id="summary">読み込み中...</p>

    <section>
      <p><strong>このページを閉じる前に、下のテキスト全体をコピーしてターミナルに貼り付けてください。</strong></p>
      <code class="block" id="fullUrl"></code>
      <button id="copyBtn" type="button">コピー</button>
      <p id="copyStatus"></p>
    </section>

    <section>
      <details>
        <summary>内訳 (デバッグ用)</summary>
        <p>code: <span class="value" id="code"></span></p>
        <p>state: <span class="value" id="state"></span></p>
        <p>error: <span class="value" id="error"></span></p>
      </details>
    </section>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var code = params.get("code") || "";
        var state = params.get("state") || "";
        var error = params.get("error") || "";
        var errorDesc = params.get("error_description") || "";

        document.getElementById("code").textContent = code;
        document.getElementById("state").textContent = state;
        document.getElementById("error").textContent = error
          ? error + (errorDesc ? ": " + errorDesc : "")
          : "(none)";

        var summary = document.getElementById("summary");
        if (error) {
          summary.className = "error";
          summary.textContent =
            "認可に失敗しました: " + error + (errorDesc ? " / " + errorDesc : "");
        } else if (!code) {
          summary.className = "error";
          summary.textContent = "認可コードが見つかりません。";
        } else {
          summary.className = "ok";
          summary.textContent =
            "認可コードを取得しました。下の文字列をコピーしてターミナルに貼ってください。";
        }

        var full = window.location.href;
        document.getElementById("fullUrl").textContent = full;

        document.getElementById("copyBtn").addEventListener("click", function () {
          navigator.clipboard.writeText(full).then(
            function () {
              document.getElementById("copyStatus").textContent =
                "クリップボードにコピーしました。";
            },
            function () {
              document.getElementById("copyStatus").textContent =
                "コピーに失敗しました。手動で選択してコピーしてください。";
            },
          );
        });
      })();
    </script>
  </body>
</html>
